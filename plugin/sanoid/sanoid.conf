# zfs-gdrsync — Sanoid dataset config
# Appended to /etc/sanoid/sanoid.conf by install.sh (only if section is absent).
# Contains only the dataset section — templates come from the Sanoid plugin's own config.
# Edit source_pool/source_dataset in the plugin config file to change the target dataset.

[cache/appdata]
    use_template = production
    recursive = zfs
    daily = 7
    pre_snapshot_script = /usr/local/sbin/snap-pre.sh
    post_snapshot_script = /usr/local/sbin/snap-post.sh
